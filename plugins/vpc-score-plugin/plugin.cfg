[configuration]
id = "VpcScore"
name = "VPC Score"
description = "Reads NVRAM game state and broadcasts score events via local WebSocket for vpc-score-agent"
author = "emb417"
version = "0.4.0"
link = "https://github.com/emb417/vpc-score-plugin"

[libraries]
windows.x64 = "plugin-vpc-score64.dll"
windows.x86 = "plugin-vpc-score.dll"
linux.x64 = "plugin-vpc-score.so"
macos.x64 = "plugin-vpc-score.dylib"
macos.arm64 = "plugin-vpc-score.dylib"